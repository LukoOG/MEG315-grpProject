<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AD-HTC Combined Cycle Schematic</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}
.container {
    text-align: center;
}
.block {
    display: inline-block;
    padding: 15px 25px;
    margin: 10px;
    border: 2px solid #333;
    border-radius: 8px;
    background-color: white;
    font-weight: bold;
}
.arrow {
    font-size: 24px;
    margin: 10px;
}
</style>
</head>
<body>

<div class="container">

<div class="block">Biomass Feed</div>
<div class="arrow">↓</div>

<div class="block">Anaerobic Digestion (AD)</div>
<div class="arrow">↓</div>

<div class="block">Biogas</div>
<div class="arrow">→</div>

<div class="block">Gas Turbine (Brayton)</div>
<div class="arrow">→</div>

<div class="block">Exhaust Heat</div>
<div class="arrow">↓</div>

<div class="block">HRSG / Boiler</div>
<div class="arrow">→</div>

<div class="block">Steam Turbine (Rankine)</div>
<div class="arrow">→</div>

<div class="block">Electric Power Output</div>

<br><br>

<div class="block">Digestate</div>
<div class="arrow">→</div>

<div class="block">HTC Reactor</div>
<div class="arrow">→</div>

<div class="block">Hydrochar (Supplementary Fuel)</div>

</div>

</body>
</html>
