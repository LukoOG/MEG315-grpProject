<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Integrated AD–HTC–Gas Turbine System (Annotated)</title>

<style>
body {
    margin: 0;
    background: #ffffff;
    font-family: "Segoe UI", Arial, sans-serif;
}

svg {
    width: 100%;
    height: 100vh;
}

/* Blocks */
.box {
    fill: #fdfdfd;
    stroke: #1f2d3a;
    stroke-width: 2.2;
    rx: 8;
    ry: 8;
}

.title {
    font-size: 22px;
    font-weight: 600;
    fill: #1f2d3a;
}

.label {
    font-size: 14px;
    font-weight: 600;
    text-anchor: middle;
}

.sub {
    font-size: 12px;
    fill: #444;
    text-anchor: middle;
}

.annotation {
    font-size: 12px;
    fill: #222;
}

/* Stream Types */
.stream {
    fill: none;
    stroke-width: 3;
    marker-end: url(#arrow);
}

.gas { stroke: #00695c; }
.heat { stroke: #7b1fa2; stroke-dasharray: 8 6; }
.power { stroke: #f39c12; stroke-width: 4; }
.air { stroke: #607d8b; }
.exhaust { stroke: #9e9e9e; }

/* Stream Labels */
.stream-label {
    font-size: 12px;
    font-weight: 600;
}

</style>
</head>

<body>

<svg viewBox="0 0 1600 850">

<defs>
<marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
<polygon points="0 0, 12 4, 0 8" fill="#333"/>
</marker>
</defs>

<!-- TITLE -->
<text x="800" y="50" text-anchor="middle" class="title">
Integrated Anaerobic Digestion – Hydrothermal Carbonization – Brayton Cycle System
</text>

<!-- FEEDSTOCK -->
<rect x="60" y="350" width="170" height="100" class="box"/>
<text x="145" y="385" class="label">Biomass Feedstock</text>
<text x="145" y="410" class="sub">ṁ_biomass</text>

<!-- AD -->
<rect x="300" y="280" width="230" height="130" class="box"/>
<text x="415" y="315" class="label">Anaerobic Digestion (AD)</text>
<text x="415" y="340" class="sub">T = 35–55°C</text>
<text x="415" y="360" class="sub">η_AD</text>
<text x="415" y="380" class="sub">Biogas: 55–65% CH₄</text>

<!-- HTC -->
<rect x="300" y="500" width="230" height="150" class="box"/>
<text x="415" y="535" class="label">HTC Reactor</text>
<text x="415" y="560" class="sub">T = 180–250°C</text>
<text x="415" y="580" class="sub">P = 10–40 bar</text>
<text x="415" y="600" class="sub">Hydrochar + Volatiles</text>

<!-- GAS CLEANING -->
<rect x="650" y="350" width="220" height="110" class="box"/>
<text x="760" y="385" class="label">Gas Conditioning</text>
<text x="760" y="410" class="sub">Moisture Removal</text>
<text x="760" y="430" class="sub">H₂S Scrubbing</text>

<!-- COMBUSTION -->
<rect x="1000" y="350" width="200" height="110" class="box"/>
<text x="1100" y="385" class="label">Combustion Chamber</text>
<text x="1100" y="410" class="sub">T_in = 900–1200°C</text>
<text x="1100" y="430" class="sub">ṁ_fuel + ṁ_air</text>

<!-- TURBINE -->
<rect x="1300" y="330" width="220" height="130" class="box"/>
<text x="1410" y="365" class="label">Gas Turbine (Brayton)</text>
<text x="1410" y="390" class="sub">η_turbine</text>
<text x="1410" y="410" class="sub">Compressor + Turbine</text>

<!-- GENERATOR -->
<rect x="1300" y="540" width="220" height="100" class="box"/>
<text x="1410" y="575" class="label">Generator</text>
<text x="1410" y="600" class="sub">Electrical Output (kW)</text>

<!-- HEAT RECOVERY -->
<rect x="1000" y="600" width="240" height="120" class="box"/>
<text x="1120" y="635" class="label">Heat Recovery Unit</text>
<text x="1120" y="660" class="sub">Exhaust Heat Exchanger</text>
<text x="1120" y="680" class="sub">η_HR</text>

<!-- MAIN STREAMS -->

<!-- Biomass Split -->
<line x1="230" y1="400" x2="300" y2="340" class="stream gas"/>
<line x1="230" y1="400" x2="300" y2="575" class="stream gas"/>

<!-- AD + HTC to Gas Cleaning -->
<line x1="530" y1="340" x2="650" y2="405" class="stream gas"/>
<line x1="530" y1="575" x2="650" y2="405" class="stream gas"/>

<text x="580" y="360" class="stream-label" fill="#00695c">
Biogas (ṁ_gas)
</text>

<!-- Gas to Combustion -->
<line x1="870" y1="405" x2="1000" y2="405" class="stream gas"/>

<!-- Combustion to Turbine -->
<line x1="1200" y1="405" x2="1300" y2="405" class="stream gas"/>

<!-- Turbine to Generator -->
<line x1="1410" y1="460" x2="1410" y2="540" class="stream power"/>

<text x="1430" y="505" class="stream-label" fill="#f39c12">
Ẇ_electric
</text>

<!-- Air Intake -->
<text x="940" y="300" class="annotation">Air Intake (ṁ_air)</text>
<line x1="940" y1="310" x2="1000" y2="370" class="stream air"/>

<!-- Exhaust -->
<line x1="1520" y1="405" x2="1580" y2="405" class="stream exhaust"/>
<text x="1530" y="385" class="annotation">Exhaust (T_ex)</text>

<!-- Exhaust to Heat Recovery -->
<line x1="1410" y1="460" x2="1120" y2="600" class="stream heat"/>

<!-- Heat Recovery to AD -->
<line x1="1000" y1="660" x2="415" y2="280" class="stream heat"/>
<text x="750" y="450" class="stream-label" fill="#7b1fa2">
Recovered Heat (Q̇_rec)
</text>

<!-- Heat Recovery to HTC -->
<line x1="1000" y1="680" x2="415" y2="500" class="stream heat"/>

</svg>

</body>
</html>
